name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  functions:
    name: Functions - Build & Test
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: functions/package-lock.json

      - name: Install dependencies
        working-directory: functions
        run: npm ci

      - name: Build
        working-directory: functions
        run: npm run build

      - name: Run tests
        working-directory: functions
        run: npm run test:run

  web:
    name: Web - Build & Lint
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: web/package-lock.json

      - name: Install dependencies
        working-directory: web
        run: npm ci

      - name: Type check
        working-directory: web
        run: npx tsc -b

      - name: Build
        working-directory: web
        run: npx vite build

  smoke:
    name: Smoke Tests
    runs-on: ubuntu-latest
    needs: [functions, web]

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Azurite
        run: npm install -g azurite

      - name: Install Azure Functions Core Tools
        run: npm install -g azure-functions-core-tools@4 --unsafe-perm true

      - name: Install all dependencies
        run: |
          npm ci
          cd functions && npm ci
          cd ../web && npm ci

      - name: Build Functions
        working-directory: functions
        run: npm run build

      - name: Install Playwright Chromium
        run: npx playwright install --with-deps chromium

      - name: Start services
        run: |
          # Start Azurite in background
          azurite --silent --blobPort 10000 --queuePort 10001 --tablePort 10002 &

          # Start Functions in background
          cd functions && npx func start --port 7071 &

          # Start Vite dev server in background
          cd web && npx vite --port 5173 &

          # Global setup in Playwright waits for services to be ready
          sleep 5

      - name: Run smoke tests
        run: npm run test:smoke

      - name: Upload test artifacts
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: smoke-test-results
          path: test-results/
          retention-days: 7
